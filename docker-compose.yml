version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: kanoneska_redis
    ports:
      - "6379:6379"
    restart: always

  travel-rag:
    build: .
    container_name: travel_rag_assistant
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: kanoneska_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - travel-rag
    restart: always
